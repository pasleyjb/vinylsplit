app-id: io.github.pasleyjb.VinylSplit

runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk

command: vinylsplit

finish-args:
  - --share=network
  - --filesystem=home

modules:
  - python-dependencies.json

  - name: vinylsplit
    buildsystem: simple

    build-commands:
      - pip3 install --no-build-isolation --no-index --find-links="file://${PWD}" --prefix=/app .

    sources:
      - type: dir
        path: ../../
